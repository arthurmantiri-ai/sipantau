# Konfigurasi Netlify — Klinik Imanuel
# Situs statis (tanpa build step) + Netlify Functions untuk kirim Email/WhatsApp invoice.

[build]
  publish = "."                      # root repo (file .html disajikan apa adanya)
  functions = "netlify/functions"    # lokasi serverless functions

[functions]
  node_bundler = "esbuild"           # bundel dependency function otomatis

# Security headers (dipertahankan dari konfigurasi asli Anda)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
