# Konfigurasi Netlify untuk situs statis + Functions
# Situs Anda tetap statik (tanpa build step); Functions dibundel otomatis.

[build]
  publish = "."                      # root repo (file .html disajikan apa adanya)
  functions = "netlify/functions"    # lokasi serverless functions

[functions]
  node_bundler = "esbuild"           # bundel dependency function otomatis
