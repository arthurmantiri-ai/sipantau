<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Keuangan - Sistem Informasi Klinik</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success-bg: #ecfdf5;
            --success-text: #047857;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .form-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        .header-form {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 20px;
        }

        .btn-back {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-right: 20px;
            transition: color 0.3s;
        }

        .btn-back:hover { color: var(--primary-color); }

        .header-form h2 { font-size: 1.5rem; font-weight: 600; }

        .form-group { margin-bottom: 20px; }
        
        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
            background-color: #fff;
            color: var(--text-main);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* Layout untuk Input Rupiah */
        .input-rp {
            display: flex;
            align-items: center;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #fff;
            overflow: hidden;
            transition: all 0.3s;
        }

        .input-rp:focus-within {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .rp-text {
            padding: 12px 15px;
            background-color: #f1f5f9;
            color: var(--text-muted);
            font-weight: 600;
            border-right: 1px solid var(--border-color);
        }

        .rp-input {
            border: none;
            border-radius: 0;
            outline: none;
            box-shadow: none;
            width: 100%;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
        }

        /* Box Total Harian */
        .total-box {
            background-color: var(--success-bg);
            border: 1px dashed var(--success-text);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-top: 30px;
            margin-bottom: 20px;
        }

        .total-box p {
            font-size: 0.9rem;
            color: var(--success-text);
            margin-bottom: 5px;
            font-weight: 600;
        }

        .total-box h3 {
            font-size: 1.8rem;
            color: var(--success-text);
            font-weight: 700;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-submit:hover { background-color: var(--primary-hover); }

        @media (max-width: 480px) {
            .form-container { padding: 25px 20px; }
        }
    </style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="form-container">
        <div class="header-form">
            <a href="index.html" class="btn-back" title="Kembali ke Beranda">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h2>Laporan Keuangan</h2>
        </div>

        <form action="#" method="POST" id="formKeuangan">
            
            <div class="form-group">
                <label for="tanggal">Tanggal Pemasukan</label>
                <input type="date" id="tanggal" name="tanggal" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="pendapatan_umum">Pendapatan Poli Umum</label>
                <div class="input-rp">
                    <span class="rp-text">Rp</span>
                    <input type="number" id="pendapatan_umum" name="pendapatan_umum" class="form-control rp-input" placeholder="0" min="0" required>
                </div>
            </div>

            <div class="form-group">
                <label for="pendapatan_gigi">Pendapatan Poli Gigi</label>
                <div class="input-rp">
                    <span class="rp-text">Rp</span>
                    <input type="number" id="pendapatan_gigi" name="pendapatan_gigi" class="form-control rp-input" placeholder="0" min="0" required>
                </div>
            </div>

            <div class="total-box">
                <p>Total Pemasukan Hari Ini</p>
                <h3 id="teks_total">Rp 0</h3>
                <input type="hidden" id="total_pemasukan" name="total_pemasukan" value="0">
            </div>

            <button type="submit" class="btn-submit">Simpan Data Pemasukan</button>
        </form>
    </div>

    <script>
        const SUPABASE_URL = 'https://xbvnydbglqyqnhwddjvm.supabase.co'
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhidm55ZGJnbHF5cW5od2RkanZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MzQwNTMsImV4cCI6MjA5NjMxMDA1M30.QRjVy7TSJi7vOeF3sZzsk1JSD0mg2NMhwBMlO4YrOv0'
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

        // Otomatis isi tanggal hari ini
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('tanggal').value = new Date().toISOString().split('T')[0]
        })

        // Kalkulasi total real-time
        const inputUmum = document.getElementById('pendapatan_umum')
        const inputGigi = document.getElementById('pendapatan_gigi')
        const teksTotal = document.getElementById('teks_total')
        const hiddenTotal = document.getElementById('total_pemasukan')

        function hitungTotal() {
            const valUmum = parseFloat(inputUmum.value) || 0
            const valGigi = parseFloat(inputGigi.value) || 0
            const total = valUmum + valGigi
            hiddenTotal.value = total
            teksTotal.innerText = new Intl.NumberFormat('id-ID', {
                style: 'currency', currency: 'IDR', maximumFractionDigits: 0
            }).format(total)
        }
        inputUmum.addEventListener('input', hitungTotal)
        inputGigi.addEventListener('input', hitungTotal)

        // Kirim data ke Supabase saat form disubmit
        document.getElementById('formKeuangan').addEventListener('submit', async (e) => {
            e.preventDefault()
            const data = {
                tanggal:         document.getElementById('tanggal').value,
                pendapatan_umum: parseInt(inputUmum.value) || 0,
                pendapatan_gigi: parseInt(inputGigi.value) || 0,
                total_pemasukan: parseInt(hiddenTotal.value) || 0,
            }
            const { error } = await db.from('laporan_keuangan').insert([data])
            if (error) {
                alert('Gagal menyimpan: ' + error.message)
            } else {
                alert('✓ Laporan keuangan berhasil disimpan!')
                e.target.reset()
                hitungTotal()
                document.getElementById('tanggal').value = new Date().toISOString().split('T')[0]
            }
        })
    </script>
</body>
</html>
