<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Pasien Kontrol - Sistem Informasi Klinik</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --info-bg: #eff6ff;
            --info-text: #1e40af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .form-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 650px;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        .header-form {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 20px;
        }

        .btn-back {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-right: 20px;
            transition: color 0.3s;
        }

        .btn-back:hover { color: var(--primary-color); }
        .header-form h2 { font-size: 1.5rem; font-weight: 600; }

        .info-box {
            background-color: var(--info-bg);
            color: var(--info-text);
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid var(--primary-color);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group { margin-bottom: 20px; }
        
        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-control[readonly] {
            background-color: #f1f5f9;
            color: var(--text-muted);
            cursor: not-allowed;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
            line-height: 1.5;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover { background-color: var(--primary-hover); }

        @media (max-width: 600px) {
            .form-container { padding: 25px 20px; }
            .form-row { grid-template-columns: 1fr; gap: 0; }
        }
    </style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="form-container">
        <div class="header-form">
            <a href="index.html" class="btn-back" title="Kembali ke Beranda">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h2>Input Pasien Kontrol</h2>
        </div>

        <div class="info-box">
            <i class="fa-solid fa-circle-info fa-lg"></i>
            <p>Data ini akan diteruskan ke petugas <strong>Follow-up</strong> untuk menghubungi pasien sesuai jadwal yang ditentukan.</p>
        </div>

        <form action="#" method="POST" id="formPasienKontrol">
            
            <div class="form-row">
                <div class="form-group">
                    <label for="nama_pasien">Nama Pasien</label>
                    <input type="text" id="nama_pasien" name="nama_pasien" class="form-control" placeholder="Nama lengkap" required>
                </div>

                <div class="form-group">
                    <label for="no_bpjs">No. BPJS / NIK</label>
                    <input type="text" id="no_bpjs" name="no_bpjs" class="form-control" placeholder="Opsional">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="no_wa">Nomor WhatsApp / HP</label>
                    <input type="tel" id="no_wa" name="no_wa" class="form-control" placeholder="08xxxxxxxxxx" required>
                </div>

                <div class="form-group">
                    <label for="poli_asal">Poli Asal</label>
                    <select id="poli_asal" name="poli_asal" class="form-control" required>
                        <option value="" disabled selected>Pilih Poli...</option>
                        <option value="Poli Umum">Poli Umum</option>
                        <option value="Poli Gigi">Poli Gigi</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="nama_dokter">Nama Dokter</label>
                    <input type="text" id="nama_dokter" name="nama_dokter" class="form-control" placeholder="Tulis nama dokter pemeriksa" required>
                </div>

                <div class="form-group">
                    <label for="diagnosa">Diagnosa / Alasan Kontrol</label>
                    <input type="text" id="diagnosa" name="diagnosa" class="form-control" placeholder="Contoh: Evaluasi Hipertensi" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="tanggal_kontrol">Tanggal Rencana Kontrol</label>
                    <input type="date" id="tanggal_kontrol" name="tanggal_kontrol" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="tanggal_followup">Jadwal Petugas Menghubungi (H-1)</label>
                    <input type="date" id="tanggal_followup" name="tanggal_followup" class="form-control" readonly title="Dihitung otomatis 1 hari sebelum jadwal kontrol">
                </div>
            </div>

            <div class="form-group">
                <label for="instruksi_petugas">Instruksi Khusus untuk Petugas Follow-up (Opsional)</label>
                <textarea id="instruksi_petugas" name="instruksi_petugas" class="form-control" placeholder="Contoh: Tolong ingatkan pasien untuk puasa mulai jam 10 malam sebelum jadwal kontrol."></textarea>
            </div>

            <button type="submit" class="btn-submit">Kirim ke Petugas Follow-up</button>
        </form>
    </div>

    <script>
        const SUPABASE_URL = 'https://xbvnydbglqyqnhwddjvm.supabase.co'
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhidm55ZGJnbHF5cW5od2RkanZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MzQwNTMsImV4cCI6MjA5NjMxMDA1M30.QRjVy7TSJi7vOeF3sZzsk1JSD0mg2NMhwBMlO4YrOv0'
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

        // Otomatis isi tanggal follow up (H-1)
        const inputTglKontrol = document.getElementById('tanggal_kontrol')
        const inputTglFollowUp = document.getElementById('tanggal_followup')
        inputTglKontrol.addEventListener('change', function() {
            if (this.value) {
                const date = new Date(this.value)
                date.setDate(date.getDate() - 1)
                inputTglFollowUp.value = date.toISOString().split('T')[0]
            } else {
                inputTglFollowUp.value = ''
            }
        })

        // Kirim data ke Supabase saat form disubmit
        document.getElementById('formPasienKontrol').addEventListener('submit', async (e) => {
            e.preventDefault()
            const data = {
                nama_pasien:       document.getElementById('nama_pasien').value,
                no_bpjs:             document.getElementById('no_bpjs').value || null,
                no_wa:             document.getElementById('no_wa').value,
                poli_asal:         document.getElementById('poli_asal').value,
                nama_dokter:       document.getElementById('nama_dokter').value,
                diagnosa:          document.getElementById('diagnosa').value,
                tanggal_kontrol:   document.getElementById('tanggal_kontrol').value,
                tanggal_followup:  document.getElementById('tanggal_followup').value || null,
                instruksi_petugas: document.getElementById('instruksi_petugas').value || null,
            }
            const { error } = await db.from('pasien_kontrol').insert([data])
            if (error) {
                alert('Gagal menyimpan: ' + error.message)
            } else {
                alert('✓ Jadwal kontrol berhasil disimpan!')
                e.target.reset()
            }
        })
    </script>
</body>
</html>
