<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Poli Umum - Sistem Informasi Klinik</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --danger-color: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .form-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 750px;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        .header-form {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 20px;
        }

        .btn-back {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-right: 20px;
            transition: color 0.3s;
        }

        .btn-back:hover { color: var(--primary-color); }
        .header-form h2 { font-size: 1.5rem; font-weight: 600; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        .form-group { margin-bottom: 20px; }
        
        .form-group label.main-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
            background-color: #fff;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* Desain Chips untuk Multiple Checkbox Tindakan */
        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }

        .checkbox-item input[type="checkbox"] { display: none; }

        .checkbox-item label {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .checkbox-item input[type="checkbox"]:checked + label {
            background-color: #eff6ff;
            border-color: var(--primary-color);
            color: var(--primary-color);
            font-weight: 600;
            box-shadow: inset 0 0 0 1px var(--primary-color);
        }

        /* Desain Input Diagnosa Dinamis */
        .diagnosa-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }
        .diagnosa-wrapper {
            display: flex; gap: 10px; margin-bottom: 12px; animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-add {
            background-color: #eff6ff; color: var(--primary-color); border: 1px dashed var(--primary-color);
            padding: 6px 12px; font-size: 0.85rem; font-weight: 600; border-radius: 6px; cursor: pointer; transition: all 0.3s;
        }
        .btn-add:hover { background-color: var(--primary-color); color: white; }
        
        .btn-remove {
            background-color: #fef2f2; color: var(--danger-color); border: 1px solid #fee2e2;
            padding: 0 15px; border-radius: 8px; cursor: pointer; transition: all 0.3s;
        }
        .btn-remove:hover { background-color: var(--danger-color); color: white; }

        .btn-submit {
            width: 100%; background-color: var(--primary-color); color: white; border: none;
            padding: 14px; font-size: 1rem; font-weight: 600; border-radius: 8px; cursor: pointer;
            transition: background-color 0.3s; margin-top: 20px;
        }
        .btn-submit:hover { background-color: var(--primary-hover); }

        #container_tindakan_lain {
            margin-top: 12px;
            display: none; /* Disembunyikan secara default */
        }

        @media (max-width: 600px) {
            .form-container { padding: 25px 20px; }
            .form-row, .form-row-3 { grid-template-columns: 1fr; gap: 0; }
        }
    </style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="form-container">
        <div class="header-form">
            <a href="index.html" class="btn-back" title="Kembali ke Beranda">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h2>Register Harian Poli Umum</h2>
        </div>

        <form action="#" method="POST" id="formPoliUmum">
            
            <div class="form-row">
                <div class="form-group">
                    <label for="nama_pasien" class="main-label">Nama Pasien</label>
                    <input type="text" id="nama_pasien" name="nama_pasien" class="form-control" placeholder="Nama lengkap" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="usia" class="main-label">Usia</label>
                        <input type="number" id="usia" name="usia" class="form-control" placeholder="Tahun" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="jenis_kelamin" class="main-label">Jenis Kelamin</label>
                        <select id="jenis_kelamin" name="jenis_kelamin" class="form-control" required>
                            <option value="" disabled selected>Pilih...</option>
                            <option value="Laki-laki">Laki-laki</option>
                            <option value="Perempuan">Perempuan</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="no_bpjs" class="main-label">Nomor BPJS / NIK</label>
                    <input type="text" id="no_bpjs" name="no_bpjs" class="form-control" placeholder="Nomor identitas">
                </div>
                <div class="form-group">
                    <label for="no_telp" class="main-label">Nomor Telepon / HP</label>
                    <input type="tel" id="no_telp" name="no_telp" class="form-control" placeholder="08xxxxxxxxxx" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="status_pasien" class="main-label">Status Pasien</label>
                    <select id="status_pasien" name="status_pasien" class="form-control" required>
                        <option value="" disabled selected>Pilih Status...</option>
                        <option value="Pasien Baru">Pasien Baru</option>
                        <option value="Pasien Lama">Pasien Lama</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="pembayaran" class="main-label">Jenis Pembayaran</label>
                    <select id="pembayaran" name="pembayaran" class="form-control" required>
                        <option value="" disabled selected>Pilih Pembayaran...</option>
                        <option value="BPJS">BPJS</option>
                        <option value="Umum">Umum</option>
                    </select>
                </div>
            </div>
<div class="form-row-3">
    <div class="form-group">
        <label for="tanggal" class="main-label">Tanggal Kunjungan</label>
        <input type="date" id="tanggal" name="tanggal" class="form-control" required>
    </div>
    <div class="form-group">
        <label for="jam_kedatangan" class="main-label">Jam Kedatangan</label>
        <input type="time" id="jam_kedatangan" name="jam_kedatangan" class="form-control" required>
    </div>
    <div class="form-group">
        <label for="nama_dokter" class="main-label">Nama Dokter</label>
        <input type="text" id="nama_dokter" name="nama_dokter" class="form-control" placeholder="Nama dokter" required>
    </div>
</div>            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 20px 0;">

            <div class="form-group">
                <div class="diagnosa-header">
                    <label class="main-label" style="margin-bottom:0;">Diagnosis (Maksimal 5)</label>
                    <button type="button" id="btnAddDiagnosa" class="btn-add">
                        <i class="fa-solid fa-plus"></i> Tambah Diagnosis
                    </button>
                </div>
                
                <div class="diagnosa-wrapper" id="box_diagnosa1">
                    <input type="text" id="diagnosa1" name="diagnosa1" class="form-control" placeholder="Diagnosis 1 (Utama)" required>
                </div>
                <div class="diagnosa-wrapper" id="box_diagnosa2" style="display: none;">
                    <input type="text" id="diagnosa2" name="diagnosa2" class="form-control" placeholder="Diagnosis 2">
                    <button type="button" class="btn-remove" onclick="hideDiagnosa(2)"><i class="fa-solid fa-trash"></i></button>
                </div>
                <div class="diagnosa-wrapper" id="box_diagnosa3" style="display: none;">
                    <input type="text" id="diagnosa3" name="diagnosa3" class="form-control" placeholder="Diagnosis 3">
                    <button type="button" class="btn-remove" onclick="hideDiagnosa(3)"><i class="fa-solid fa-trash"></i></button>
                </div>
                <div class="diagnosa-wrapper" id="box_diagnosa4" style="display: none;">
                    <input type="text" id="diagnosa4" name="diagnosa4" class="form-control" placeholder="Diagnosis 4">
                    <button type="button" class="btn-remove" onclick="hideDiagnosa(4)"><i class="fa-solid fa-trash"></i></button>
                </div>
                <div class="diagnosa-wrapper" id="box_diagnosa5" style="display: none;">
                    <input type="text" id="diagnosa5" name="diagnosa5" class="form-control" placeholder="Diagnosis 5">
                    <button type="button" class="btn-remove" onclick="hideDiagnosa(5)"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>

            <div class="form-group">
                <label class="main-label">Tindakan Medis (Bisa pilih lebih dari satu)</label>
                <div class="checkbox-grid">
                    <div class="checkbox-item">
                        <input type="checkbox" id="tindakan_none" name="tindakan" value="Tidak ada tindakan">
                        <label for="tindakan_none">Tidak ada tindakan</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="tindakan_lab" name="tindakan" value="Lab GCU">
                        <label for="tindakan_lab">Lab GCU</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="tindakan_ekg" name="tindakan" value="EKG">
                        <label for="tindakan_ekg">EKG</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="tindakan_rawat_luka" name="tindakan" value="Rawat luka">
                        <label for="tindakan_rawat_luka">Rawat luka</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="tindakan_hecting" name="tindakan" value="Hecting luka">
                        <label for="tindakan_hecting">Hecting luka</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="tindakan_anc" name="tindakan" value="ANC">
                        <label for="tindakan_anc">ANC</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="tindakan_lain" name="tindakan" value="Lain-lain">
                        <label for="tindakan_lain">Lain-lain</label>
                    </div>
                </div>

                <div id="container_tindakan_lain">
                    <input type="text" id="input_tindakan_lain" name="tindakan_lain_detail" class="form-control" placeholder="Sebutkan tindakan lainnya...">
                </div>
            </div>

            <button type="submit" class="btn-submit">Simpan Data Poli Umum</button>
        </form>
    </div>

    <script>
        const SUPABASE_URL = 'https://xbvnydbglqyqnhwddjvm.supabase.co'
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhidm55ZGJnbHF5cW5od2RkanZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MzQwNTMsImV4cCI6MjA5NjMxMDA1M30.QRjVy7TSJi7vOeF3sZzsk1JSD0mg2NMhwBMlO4YrOv0'
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

        // Logika Dinamis Diagnosis
        const btnAddDiagnosa = document.getElementById('btnAddDiagnosa')
        let statusDiagnosa = { 2: false, 3: false, 4: false, 5: false }
        btnAddDiagnosa.addEventListener('click', () => {
            for (let i = 2; i <= 5; i++) {
                if (!statusDiagnosa[i]) {
                    document.getElementById(`box_diagnosa${i}`).style.display = 'flex'
                    document.getElementById(`diagnosa${i}`).required = true
                    statusDiagnosa[i] = true
                    if (i === 5) btnAddDiagnosa.style.visibility = 'hidden'
                    break
                }
            }
        })
        function hideDiagnosa(index) {
            document.getElementById(`box_diagnosa${index}`).style.display = 'none'
            const input = document.getElementById(`diagnosa${index}`)
            input.value = ''
            input.required = false
            statusDiagnosa[index] = false
            btnAddDiagnosa.style.visibility = 'visible'
        }

        // Logika Tindakan "Lain-lain"
        const checkboxLain = document.getElementById('tindakan_lain')
        const containerTindakanLain = document.getElementById('container_tindakan_lain')
        const inputTindakanLain = document.getElementById('input_tindakan_lain')
        checkboxLain.addEventListener('change', function() {
            if (this.checked) {
                containerTindakanLain.style.display = 'block'
                inputTindakanLain.required = true
            } else {
                containerTindakanLain.style.display = 'none'
                inputTindakanLain.required = false
                inputTindakanLain.value = ''
            }
        })

        // Kirim data ke Supabase saat form disubmit
        document.getElementById('formPoliUmum').addEventListener('submit', async (e) => {
            e.preventDefault()
            const tindakanChecked = [...document.querySelectorAll('input[name="tindakan"]:checked')]
                                    .map(el => el.value).join(', ')
            const diagArr = ['diagnosa1','diagnosa2','diagnosa3','diagnosa4','diagnosa5']
                            .map(id => document.getElementById(id)?.value || null)
                            .filter(v => v)
           const data = {
                tanggal:         document.getElementById('tanggal').value,
                jam_kedatangan:  document.getElementById('jam_kedatangan').value,
                nama_pasien:     document.getElementById('nama_pasien').value,
                usia:            parseInt(document.getElementById('usia').value) || null,
                jenis_kelamin:   document.getElementById('jenis_kelamin').value,
                no_telp:         document.getElementById('no_telp').value || null,
                no_bpjs:         document.getElementById('no_bpjs').value || null,
                status_pasien:   document.getElementById('status_pasien').value,
                pembayaran:      document.getElementById('pembayaran').value,
                diagnosis:       diagArr.join(', '),
                tindakan:        tindakanChecked || null,
                nama_dokter:     document.getElementById('nama_dokter').value,
            }
            const { error } = await db.from('poli_umum').insert([data])
            if (error) {
                alert('Gagal menyimpan: ' + error.message)
            } else {
                alert('✓ Data Poli Umum berhasil disimpan!')
                e.target.reset()
            }
        })
    </script>
</body>
</html>
